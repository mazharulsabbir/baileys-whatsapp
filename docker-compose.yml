# Compose v2.24+ supports optional env_file. If your CLI errors here, upgrade Docker Desktop
# or remove the `path` / `required` keys and use `env_file: [ .env ]` after copying `.env.example` → `.env`.
name: baileys-whatsapp

services:
  db:
    image: postgres:16-alpine
    container_name: baileys-whatsapp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      # Use container env vars ($$ → $) so this matches custom POSTGRES_* without compose interpolation issues
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - baileys-network
    # Resource limits (optional, uncomment for production)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2G
    #     reservations:
    #       cpus: '1'
    #       memory: 1G

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: baileys-whatsapp-web:latest
    container_name: baileys-whatsapp-api
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      # Database - Always use the Compose network hostname
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}

      # Authentication
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production-use-openssl-rand-base64-32}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}

      # WhatsApp Session Storage
      WHATSAPP_SESSION_ROOT: /data/sessions
      WHATSAPP_MEDIA_ROOT: /data/wa-media-cache

      # Media Public URL (for Odoo to download)
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://localhost:3000/api/public/wa-media}

      # Odoo Webhook Configuration
      ODOO_BASE_URL: ${ODOO_BASE_URL:-}
      ODOO_WEBHOOK_PATH: ${ODOO_WEBHOOK_PATH:-/acrux_webhook/whatsapp_connector}
      WEBHOOK_MAX_RETRIES: ${WEBHOOK_MAX_RETRIES:-3}
      WEBHOOK_RETRY_DELAY_MS: ${WEBHOOK_RETRY_DELAY_MS:-1000}
      WEBHOOK_TIMEOUT_MS: ${WEBHOOK_TIMEOUT_MS:-20000}
      ENABLE_WEBHOOK_DLQ: ${ENABLE_WEBHOOK_DLQ:-true}

      # Payment Gateway
      SSLCOMMERZ_STORE_ID: ${SSLCOMMERZ_STORE_ID:-}
      SSLCOMMERZ_STORE_PASSWORD: ${SSLCOMMERZ_STORE_PASSWORD:-}
      SSLCOMMERZ_IS_LIVE: ${SSLCOMMERZ_IS_LIVE:-false}

      # Application Settings
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Session Configuration
      AUTO_RECONNECT: ${AUTO_RECONNECT:-true}
      SESSION_KEEPALIVE_INTERVAL: ${SESSION_KEEPALIVE_INTERVAL:-30000}

      # Health Check
      HEALTH_CHECK_TIMEOUT: ${HEALTH_CHECK_TIMEOUT:-5000}
      HEALTH_CHECK_DETAILED: ${HEALTH_CHECK_DETAILED:-false}

      # Rate Limiting
      API_RATE_LIMIT: ${API_RATE_LIMIT:-60}
      WEBHOOK_RATE_LIMIT: ${WEBHOOK_RATE_LIMIT:-100}

      # Debug/Monitoring
      ENABLE_WEBHOOK_DEBUG: ${ENABLE_WEBHOOK_DEBUG:-true}
      ENABLE_METRICS: ${ENABLE_METRICS:-false}

    volumes:
      - whatsapp_sessions:/data/sessions
      - media_cache:/data/wa-media-cache
      - app_logs:/data/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - baileys-network
    # Resource limits (optional, uncomment for production)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '4'
    #       memory: 4G
    #     reservations:
    #       cpus: '2'
    #       memory: 2G
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  baileys-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  whatsapp_sessions:
    driver: local
  media_cache:
    driver: local
  app_logs:
    driver: local
